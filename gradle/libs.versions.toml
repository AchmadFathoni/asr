[versions]
agp = "9.2.1"
compileSdk = "37"
minSdk = "29"
targetSdk = "37"
kotlin = "2.4.0"
ksp = "2.3.9"
compose-multiplatform = "1.11.1"
material3 = "1.11.0-alpha07"
room3 = "3.0.0"
navigation = "1.1.1"
kotlinx-datetime = "0.8.0"
kotlinx-serialization-json = "1.11.0"
kotlinx-coroutines = "1.11.0"
koin = "4.2.2"
